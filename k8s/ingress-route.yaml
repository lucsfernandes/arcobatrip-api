apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: arcobatrip-api-ingress
  namespace: arcobatrip
  labels:
    app.kubernetes.io/name: arcobatrip-api
    app.kubernetes.io/part-of: arcobatrox
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`arcobatrip.arcobatrox.com.br`) && PathPrefix(`/api/v1`)
      kind: Rule
      services:
        - name: arcobatrip-api
          port: 80
      middlewares:
        - name: security-headers
          namespace: traefik
        - name: compress
          namespace: traefik
        - name: rate-limit
          namespace: traefik
    - match: Host(`www.arcobatrip.arcobatrox.com.br`) && PathPrefix(`/api/v1`)
      kind: Rule
      services:
        - name: arcobatrip-api
          port: 80
      middlewares:
        - name: security-headers
          namespace: traefik
        - name: compress
          namespace: traefik
        - name: rate-limit
          namespace: traefik
  tls:
    secretName: arcobatrip-tls